<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AudioTrace call report</title>
<style>
  body { font: 15px/1.5 -apple-system, system-ui, sans-serif; margin: 2rem auto;
         max-width: 720px; color: #1a1a1a; }
  h1 { font-size: 1.4rem; margin-bottom: .25rem; }
  table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
  th, td { text-align: left; padding: .5rem .75rem; border-bottom: 1px solid #eee; }
  th { color: #666; font-weight: 600; }
  td.value { text-align: right; font-variant-numeric: tabular-nums; }
  .banner { padding: .75rem 1rem; border-radius: 6px; font-weight: 600; }
  .ok { background: #e7f6ec; color: #176c33; }
  .bad { background: #fdecea; color: #a31515; }
  .regressed { color: #a31515; }
  .improved { color: #176c33; }
  footer { color: #999; font-size: .8rem; margin-top: 2rem; }
</style>
</head>
<body>
<h1>AudioTrace call report</h1>

<table>
<thead><tr><th>Metric</th><th class="value">Value</th></tr></thead>
<tbody>
<tr><td>Outcome</td><td class="value">completed</td></tr>
<tr><td>Quality score</td><td class="value">0.93</td></tr>
<tr><td>Sentiment</td><td class="value">0.60</td></tr>
<tr><td>Caller frustrated</td><td class="value">No</td></tr>
<tr><td>Interruptions</td><td class="value">0</td></tr>
<tr><td>Speaking pace</td><td class="value">181.3 wpm</td></tr>
<tr><td>Response latency (p95)</td><td class="value">0 ms</td></tr>
<tr><td>Dropped call</td><td class="value">No</td></tr>
<tr><td>Compliance flags</td><td class="value">0</td></tr>
<tr><td>Cost</td><td class="value">$0.0340</td></tr>
<tr><td>Duration</td><td class="value">63875 ms</td></tr>
</tbody>
</table>

<footer>Generated by AudioTrace.</footer>
</body>
</html>
